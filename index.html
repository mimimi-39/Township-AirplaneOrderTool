<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タウンシップ積荷計算機</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🚢 積荷シミュレーター</h1>

    <main class="cargo-slots">
        <section class="slot">
            <label>積荷 1</label>
            <input type="text" class="item-name" placeholder="品名を入力" list="item-list">
            
            <div class="stock-input-group">
                <span class="label-text">在庫数:</span>
                <input type="number" class="item-stock" placeholder="0" min="0">
            </div>
            
            <div class="calc-result">
                </div>
        </section>

        <section class="slot">
            <label>積荷 2</label>
            <input type="text" class="item-name" placeholder="品名を入力" list="item-list">
            
            <div class="stock-input-group">
                <span class="label-text">在庫数:</span>
                <input type="number" class="item-stock" placeholder="0" min="0">
            </div>
            
            <div class="calc-result"></div>
        </section>

        <section class="slot">
            <label>積荷 3</label>
            <input type="text" class="item-name" placeholder="品名を入力" list="item-list">
            
            <div class="stock-input-group">
                <span class="label-text">在庫数:</span>
                <input type="number" class="item-stock" placeholder="0" min="0">
            </div>
            
            <div class="calc-result"></div>
        </section>
    </main>

    <datalist id="item-list"></datalist>

    <script src="recipe.js"></script>
    <script src="script.js"></script>

</body>
</html>
